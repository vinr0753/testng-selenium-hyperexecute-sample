---
version: 0.1
runson: win

autosplit: true
concurrency: 1

runtime:
  language: java
  version: 11

env:
  TOKEN: anvdegtod-asdaasda0asda-asda
  ENVIRONMENT: staging

pre:
  - mvn -Dmaven.repo.local=./.m2 dependency:resolve
  - echo TOKEN=%TOKEN%
  - echo ENVIRONMENT=%ENVIRONMENT%

testDiscovery:
  type: raw
  mode: dynamic
  command: grep 'test name' xml/testng_win.xml | awk '{print$2}' | sed 's/name=//g' | sed 's/\x3e//g'

testRunnerCommand: mvn test `-Dplatname=win `-Dmaven.repo.local=./.m2 dependency:resolve `-DselectedTests=$test

retryOnFailure: true
maxRetries: 1

post:
  # grep: search the real HyperExecute CLI job log
  - echo "--- grep: FAIL/ERROR lines from hyperexecute-cli.log ---"
  - grep -iE 'FAIL|ERROR' hyperexecute-cli.log

  # searches deploy_status.txt, space-delimited sample file
  - echo "--- awk: extract column 2 from deploy_status.txt ---"
  - awk '{print $2}' test-data/deploy_status.txt

  - echo "--- sed: replace staging with production in deploy_status.txt ---"
  - sed 's/staging/production/g' test-data/deploy_status.txt

  - echo "--- piped chain: grep FAIL lines, then awk extracts service name ---"
  - grep 'FAIL' test-data/deploy_status.txt | awk '{print $1}'

jobLabel: [selenium-testng, win, v1, autosplit]
