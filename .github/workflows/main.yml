name: Github Actions
on:
  workflow_dispatch:
    inputs:
      username:
        required: true
        description: LT Username
      accessKey:
        description: LT Access Key
        required: true
      sampleRepoLink:
        description: Link to the HyperExecute sample repo
        default: https://github.com/vinr0753/testng-selenium-hyperexecute-sample
        required: true
jobs:
  HyperExecute-Selenium:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2

      - name: Starting CLI testing
        id: testng
        shell: bash
        continue-on-error: true
        run: |
          echo "Step 1: Downloading sample suite"
          git clone ${{ github.event.inputs.sampleRepoLink }}
          echo "Step 2: Download CLI"
          cd testng-selenium-hyperexecute-sample
          curl https://downloads.lambdatest.com/hyperexecute/windows/hyperexecute.exe -o hyperexecute.exe
          echo "Step 3: Setting Environment Variables"
          export LT_USERNAME=${{ github.event.inputs.username }}
          export LT_ACCESS_KEY=${{ github.event.inputs.accessKey }}
          echo $LT_USERNAME
          echo $LT_ACCESS_KEY
          echo "Step 4: Executing the test"
          ./hyperexecute --user $LT_USERNAME --key $LT_ACCESS_KEY --config "yaml/win/v1/(TestNG)Fixme.yaml"

      - name: Find HyperExecute log files
        if: always()
        shell: bash
        working-directory: testng-selenium-hyperexecute-sample
        run: |
          echo "Files modified in the last 10 minutes:"
          find . -type f -mmin -10 2>/dev/null
          echo ""
          echo "Any .log files anywhere in the workspace:"
          find . -iname "*.log" 2>/dev/null
          echo ""
          echo "Contents of common artifact folders, if they exist:"
          ls -la HyperExecuteResults 2>/dev/null || echo "no HyperExecuteResults folder"
          ls -la logs 2>/dev/null || echo "no logs folder"
