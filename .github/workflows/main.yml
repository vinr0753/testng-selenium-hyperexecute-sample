name: Github Actions
on:
  workflow_dispatch:
    inputs:
      username:
        required: true
        description: LT Username
      accessKey:
        description: LT Access Key
        required: true
      sampleRepoLink:
        description: Link to the HyperExecute sample repo
        default: https://github.com/vinr0753/testng-selenium-hyperexecute-sample
        required: true
jobs:
  HyperExecute-Selenium:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2

      - name: Starting CLI testing
        id: testng
        shell: bash
        continue-on-error: true
        run: |
          echo "Step 1: Downloading sample suite"
          git clone ${{ github.event.inputs.sampleRepoLink }}
          echo "Step 2: Download CLI"
          cd testng-selenium-hyperexecute-sample
          curl https://downloads.lambdatest.com/hyperexecute/windows/hyperexecute.exe -o hyperexecute.exe
          echo "Step 3: Setting Environment Variables"
          export LT_USERNAME=${{ github.event.inputs.username }}
          export LT_ACCESS_KEY=${{ github.event.inputs.accessKey }}
          echo $LT_USERNAME
          echo $LT_ACCESS_KEY
          echo "Step 4: Executing the test"
          ./hyperexecute --user $LT_USERNAME --key $LT_ACCESS_KEY --config "yaml/win/v1/(TestNG)Fixme.yaml"

      - name: Task 4 - Parse HyperExecute job log
        if: always()
        shell: bash
        working-directory: testng-selenium-hyperexecute-sample
        run: |
          LOGFILE=hyperexecute-cli.log
          echo "Using log file: $LOGFILE"
          echo ""

          echo "--- grep: lines containing FAIL or ERROR ---"
          grep -iE 'FAIL|ERROR' "$LOGFILE" || echo "No FAIL/ERROR lines found"
          echo ""

          echo "--- awk: second space-delimited column of each line ---"
          awk '{print $2}' "$LOGFILE" | head -20
          echo ""

          echo "--- sed: find-and-replace demo (staging -> production) ---"
          echo "Build environment: staging, target: staging-cluster" > staging_demo.txt
          cat staging_demo.txt
          sed 's/staging/production/g' staging_demo.txt
          echo ""

          echo "--- piped chain: grep ERROR lines, then awk extracts a field ---"
          grep -i 'ERROR' "$LOGFILE" | awk '{print $2}' || echo "No ERROR lines found"

      - name: Upload HyperExecute log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hyperexecute-cli-log
          path: testng-selenium-hyperexecute-sample/hyperexecute-cli.log
